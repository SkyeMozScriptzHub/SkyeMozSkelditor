<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Editor Mode</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Rajdhani',sans-serif;
background:
radial-gradient(circle at top left,#260000 0%,transparent 30%),
radial-gradient(circle at bottom right,#00152b 0%,transparent 30%),
#02040b;
color:white;
overflow-x:hidden;
min-height:100vh;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
}

.wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:25px;
}

.panel{
width:100%;
max-width:1200px;
background:rgba(8,12,22,.7);
backdrop-filter:blur(18px);
border-radius:30px;
padding:28px;
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 40px rgba(255,0,0,.08),
0 0 100px rgba(0,100,255,.08);
}

.header{
font-family:'Orbitron',sans-serif;
font-size:34px;
font-weight:800;
margin-bottom:25px;
color:#ff4d4d;
}

.main{
display:grid;
grid-template-columns:360px 1fr;
gap:28px;
}

.avatar-box{
background:rgba(0,0,0,.25);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
}

.avatar-frame{
position:relative;
width:100%;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
overflow:hidden;
}

.avatar-ring{
position:absolute;
width:82%;
height:82%;
border-radius:50%;
border:3px solid rgba(255,0,0,.5);
animation:spin 12s linear infinite;
box-shadow:0 0 40px rgba(255,0,0,.3);
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.avatar-preview{
width:70%;
height:70%;
border-radius:50%;
object-fit:cover;
z-index:2;
}

.upload{
margin-top:20px;
border:2px dashed rgba(255,0,0,.4);
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.upload:hover{
background:rgba(255,0,0,.08);
}

.form{
display:flex;
flex-direction:column;
gap:18px;
}

.input-group{
background:rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.08);
padding:16px;
border-radius:18px;
}

label{
display:block;
margin-bottom:10px;
font-family:'Orbitron',sans-serif;
font-size:13px;
color:#ff5555;
}

input,
textarea{
width:100%;
background:#0c1220;
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
color:white;
font-size:18px;
outline:none;
transition:.3s;
}

textarea{
min-height:150px;
resize:none;
}

input:focus,
textarea:focus{
border-color:#ff3c3c;
box-shadow:0 0 20px rgba(255,0,0,.18);
}

.row{
display:grid;
grid-template-columns:1fr auto;
gap:12px;
}

.generate{
background:linear-gradient(135deg,#ff3c3c,#900);
border:none;
padding:0 24px;
border-radius:14px;
color:white;
font-weight:700;
cursor:pointer;
}

.statuses{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.status-btn{
padding:12px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
background:#0d1423;
cursor:pointer;
transition:.3s;
}

.status-btn.active{
border-color:#ff3b3b;
box-shadow:0 0 20px rgba(255,0,0,.25);
}

.bottom{
display:flex;
gap:16px;
margin-top:15px;
}

.action{
flex:1;
padding:18px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:18px;
font-weight:700;
transition:.3s;
}

.reset{
background:#151c2d;
color:white;
}

.save{
background:linear-gradient(135deg,#ff3b3b,#920000);
color:white;
box-shadow:0 0 25px rgba(255,0,0,.2);
}

.action:hover{
transform:translateY(-2px);
}

.toast{
position:fixed;
top:25px;
right:25px;
padding:15px 20px;
background:rgba(10,15,25,.9);
border:1px solid rgba(255,0,0,.3);
border-radius:16px;
backdrop-filter:blur(14px);
opacity:0;
transform:translateY(-20px);
transition:.4s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

@media(max-width:900px){

.main{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrapper">

<div class="panel">

<div class="header">EDITOR MODE</div>

<div class="main">

<div class="avatar-box">

<div class="avatar-frame">
<div class="avatar-ring"></div>

<img
id="preview"
class="avatar-preview"
src="https://i.imgur.com/4Z7Dz0o.png"
/>

</div>

<label class="upload">
Upload Avatar
<input type="file" id="avatarInput" hidden accept="image/*">
</label>

</div>

<div class="form">

<div class="input-group">
<label>NICKNAME</label>
<input id="nickname" maxlength="20">
</div>

<div class="input-group">

<label>FRIENDCODE</label>

<div class="row">

<input id="friendcode">

<button class="generate" id="generateBtn">
GENERATE
</button>

</div>

</div>

<div class="input-group">

<label>STATUS</label>

<div class="statuses">

<div class="status-btn active">🟢 Playing</div>
<div class="status-btn">🟢 Idle</div>
<div class="status-btn">🔴 Offline</div>
<div class="status-btn">🔴 Busy</div>

</div>

</div>

<div class="input-group">
<label>LOBBY CODE</label>
<input id="lobbycode">
</div>

<div class="input-group">
<label>PLAYING SINCE</label>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button class="generate" id="startBtn">
START
</button>

<button class="generate" id="stopBtn">
STOP
</button>

<button class="generate" id="resetBtn">
RESET
</button>

</div>

<div
id="timeStatus"
style="margin-top:12px;font-size:18px;color:#aaa;"
>
No active timestamp
</div>

</div>

<div class="input-group">
<label>DESCRIPTION</label>
<textarea id="description" maxlength="200"></textarea>
</div>

<div class="bottom">

<button class="action reset" id="resetForm">
RESET</button>

<button class="action save" id="saveBtn">
SAVE CHANGES
</button>

</div>

</div>

</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
serverTimestamp,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInAnonymously,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyC0-aU-Tse8Xr3XGqXXGsIHyI4oR7iLwxU",
authDomain: "mozstudiokey.firebaseapp.com",
projectId: "mozstudiokey",
storageBucket: "mozstudiokey.firebasestorage.app",
messagingSenderId: "216274047995",
appId: "1:216274047995:web:bd7c0749bbb46d46b2315e",
measurementId: "G-T47VM18K4W"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const toastEl = document.getElementById("toast");

function toast(text){

toastEl.innerText = text;
toastEl.classList.add("show");

setTimeout(()=>{
toastEl.classList.remove("show");
},2500);

}

let uid = null;
let avatarBase64 = "";
let currentStatus = "🟢 Playing";
let playingSince = null;

signInAnonymously(auth);

onAuthStateChanged(auth, async(user)=>{

if(!user) return;

uid = user.uid;

toast("Connected");

const ref = doc(db,"profiles",uid);

onSnapshot(ref,(snap)=>{

if(!snap.exists()) return;

const data = snap.data();

nickname.value = data.nickname || "";
friendcode.value = data.friendcode || "";
lobbycode.value = data.lobbycode || "";
description.value = data.description || "";

avatarBase64 = data.avatarurl || "";
preview.src =
avatarBase64 ||
"https://i.imgur.com/4Z7Dz0o.png";

playingSince = data.playingsince || null;

timeStatus.innerText =
playingSince
? new Date(playingSince).toLocaleString()
: "No active timestamp";

});

});

const nickname = document.getElementById("nickname");
const friendcode = document.getElementById("friendcode");
const lobbycode = document.getElementById("lobbycode");
const description = document.getElementById("description");
const preview = document.getElementById("preview");
const avatarInput = document.getElementById("avatarInput");
const timeStatus = document.getElementById("timeStatus");

document.querySelector(".upload")
.onclick = ()=> avatarInput.click();

avatarInput.onchange = e=>{

const file = e.target.files[0];

if(!file) return;

if(file.size > 4 * 1024 * 1024){
toast("File too large");
return;
}

const reader = new FileReader();

reader.onload = ()=>{

avatarBase64 = reader.result;
preview.src = avatarBase64;

toast("Avatar Updated");

};

reader.readAsDataURL(file);

};

document.querySelectorAll(".status-btn")
.forEach(btn=>{

btn.onclick = ()=>{

document.querySelectorAll(".status-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

currentStatus = btn.innerText;

};

});

generateBtn.onclick = ()=>{

const names = [
"sprungfox",
"skye",
"moz",
"ghost",
"nova"
];

const rand =
Math.floor(Math.random()*9999);

friendcode.value =
names[Math.floor(Math.random()*names.length)]
+ "#" + rand;

};

startBtn.onclick = ()=>{

playingSince = Date.now();

timeStatus.innerText =
new Date(playingSince).toLocaleString();

toast("Timestamp Started");

};

stopBtn.onclick = ()=>{

playingSince = null;
timeStatus.innerText = "Stopped";

toast("Timestamp Stopped");

};

resetBtn.onclick = ()=>{

playingSince = null;
timeStatus.innerText = "Reset";

toast("Timestamp Reset");

};

saveBtn.onclick = async()=>{

if(!nickname.value.trim()){

toast("Nickname Required");
return;

}

if(!friendcode.value.includes("#")){

toast("Invalid Friendcode");
return;

}

saveBtn.disabled = true;

try{

await setDoc(doc(db,"profiles",uid),{

nickname:nickname.value.trim(),
friendcode:friendcode.value.trim(),
status:currentStatus,
lobbycode:lobbycode.value.trim(),
playingsince:playingSince,
description:description.value.trim(),
avatarurl:avatarBase64,
lastupdated:Date.now()

},{merge:true});

toast("Profile Saved");

}catch(err){

toast("Save Failed");

}

setTimeout(()=>{
saveBtn.disabled = false;
},1500);

};

resetForm.onclick = ()=>{

nickname.value = "";
friendcode.value = "";
lobbycode.value = "";
description.value = "";

toast("Form Reset");

};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const particles = [];

for(let i=0;i<120;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*0.7+0.2
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.y += p.s;

if(p.y > canvas.height){
p.y = 0;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle = "rgba(255,255,255,.8)";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — MozStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e8002a;
    --red-glow: #ff0033;
    --red-dim: #8b0015;
    --navy: #040d1a;
    --navy2: #061225;
    --panel: rgba(10,20,40,0.88);
    --border: rgba(232,0,42,0.35);
    --border-bright: rgba(232,0,42,0.7);
    --text: #e8eaf6;
    --text-dim: #7a8aaa;
    --green: #00e676;
    --mono: 'Share Tech Mono', monospace;
    --title: 'Orbitron', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }
  html, body { min-height: 100vh; background: var(--navy); font-family: var(--body); color: var(--text); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy2); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }

  /* BG */
  #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .scanlines { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); opacity: 0.4; }
  .mouse-glow { position: fixed; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle,rgba(232,0,42,0.07) 0%,transparent 70%); transform: translate(-50%,-50%); pointer-events: none; z-index: 2; }

  /* APP */
  #app { position: relative; z-index: 10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

  /* CARD */
  .card {
    width: 100%; max-width: 800px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 0 60px rgba(232,0,42,0.12), 0 0 120px rgba(232,0,42,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:none} }
  .card::before,.card::after { content:''; position:absolute; width:18px; height:18px; border-color:var(--red); border-style:solid; z-index:5; }
  .card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .card::after  { top:10px; right:10px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .card-corner-bl,.card-corner-br { position:absolute; width:18px; height:18px; z-index:5; border-color:var(--red); border-style:solid; }
  .card-corner-bl { bottom:10px; left:10px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .card-corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

  /* HEADER */
  .card-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 14px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.2); }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-title { font-family:var(--title); font-size:13px; letter-spacing:3px; font-weight:700; }
  .header-title span { color:var(--red); }
  .close-btn { width:34px; height:34px; border-radius:8px; border:1.5px solid var(--border); background:rgba(232,0,42,0.1); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-family:var(--title); }
  .close-btn:hover { background:rgba(232,0,42,0.3); border-color:var(--red); box-shadow:0 0 12px rgba(232,0,42,0.4); }

  /* BODY GRID */
  .card-body { display:grid; grid-template-columns:240px 1fr; gap:0; padding:24px; }
  @media(max-width:640px) { .card-body { grid-template-columns:1fr; padding:16px; } }

  /* LEFT — AVATAR */
  .avatar-col { display:flex; flex-direction:column; align-items:center; gap:14px; padding-right:24px; }
  @media(max-width:640px) { .avatar-col { padding-right:0; padding-bottom:20px; } }
  .avatar-ring-outer { position:relative; width:190px; height:190px; flex-shrink:0; cursor:pointer; }
  .avatar-ring-svg { position:absolute; inset:0; width:100%; height:100%; animation:spinRing 8s linear infinite; }
  @keyframes spinRing { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .avatar-ring-svg2 { position:absolute; inset:0; width:100%; height:100%; animation:spinRing 12s linear infinite reverse; opacity:0.5; }
  .avatar-glow { position:absolute; inset:10px; border-radius:50%; box-shadow:0 0 30px rgba(232,0,42,0.5),0 0 60px rgba(232,0,42,0.2); animation:breatheGlow 3s ease-in-out infinite; }
  @keyframes breatheGlow { 0%,100%{box-shadow:0 0 30px rgba(232,0,42,0.5),0 0 60px rgba(232,0,42,0.2)} 50%{box-shadow:0 0 50px rgba(232,0,42,0.8),0 0 90px rgba(232,0,42,0.35)} }
  .avatar-img-wrap { position:absolute; inset:18px; border-radius:50%; overflow:hidden; background:radial-gradient(circle at 30% 30%,#1a0510,#08020e); border:2px solid rgba(232,0,42,0.4); }
  .avatar-img { width:100%; height:100%; object-fit:cover; }
  .avatar-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:52px; }
  .avatar-hover-overlay { position:absolute; inset:18px; border-radius:50%; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; flex-direction:column; gap:6px; }
  .avatar-ring-outer:hover .avatar-hover-overlay { opacity:1; }
  .avatar-hover-overlay span { font-family:var(--title); font-size:9px; letter-spacing:2px; color:var(--red); }
  .avatar-hover-overlay svg { width:24px; height:24px; color:var(--red); }

  .change-avatar-btn {
    width:100%; padding:11px;
    background:rgba(232,0,42,0.08); border:1.5px solid var(--border);
    border-radius:10px; color:var(--text);
    font-family:var(--title); font-size:10px; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .change-avatar-btn:hover { background:rgba(232,0,42,0.2); border-color:var(--border-bright); box-shadow:0 0 15px rgba(232,0,42,0.2); }
  .upload-hint { font-size:11px; color:var(--text-dim); text-align:center; line-height:1.6; }

  /* Drag drop */
  .drag-over .avatar-ring-outer { filter:drop-shadow(0 0 20px rgba(232,0,42,0.8)); }

  /* RIGHT — FIELDS */
  .fields-col { display:flex; flex-direction:column; gap:16px; }

  /* Field group */
  .field-group { display:flex; flex-direction:column; gap:6px; }
  .field-label { font-family:var(--title); font-size:10px; letter-spacing:2.5px; color:var(--red); display:flex; align-items:center; gap:6px; }
  .field-label svg { width:13px; height:13px; }
  .field-hint { font-size:11px; color:var(--text-dim); margin-top:2px; }

  /* Inputs */
  .neon-input, .neon-textarea {
    width:100%; background:rgba(0,0,0,0.45);
    border:1.5px solid rgba(232,0,42,0.25);
    border-radius:10px; padding:12px 14px;
    color:var(--text); font-family:var(--mono); font-size:14px;
    transition:border-color 0.2s, box-shadow 0.2s;
    outline:none;
  }
  .neon-input::placeholder, .neon-textarea::placeholder { color:rgba(255,255,255,0.2); font-family:var(--mono); }
  .neon-input:focus, .neon-textarea:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(232,0,42,0.12), 0 0 20px rgba(232,0,42,0.1); }
  .neon-textarea { resize:vertical; min-height:90px; max-height:160px; }
  .char-count { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-align:right; margin-top:3px; }
  .char-count.warn { color:var(--red); }

  /* Input row (friendcode + generate) */
  .input-row { display:flex; gap:8px; align-items:center; }
  .input-row .neon-input { flex:1; }
  .gen-btn {
    padding:12px 16px; background:rgba(232,0,42,0.15);
    border:1.5px solid var(--border); border-radius:10px;
    color:var(--text); font-family:var(--title); font-size:10px; letter-spacing:1.5px;
    cursor:pointer; white-space:nowrap; transition:all 0.2s;
  }
  .gen-btn:hover { background:rgba(232,0,42,0.3); border-color:var(--red); box-shadow:0 0 12px rgba(232,0,42,0.3); }

  /* Status buttons */
  .status-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .status-btn {
    padding:9px 16px; border-radius:8px;
    border:1.5px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.3);
    color:var(--text-dim); font-family:var(--body); font-size:14px; font-weight:600;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; gap:7px;
  }
  .status-btn:hover { border-color:rgba(232,0,42,0.4); color:var(--text); }
  .status-btn.active { border-color:var(--red); background:rgba(232,0,42,0.12); color:var(--text); box-shadow:0 0 12px rgba(232,0,42,0.2); }
  .sdot { width:9px; height:9px; border-radius:50%; }
  .sdot.g { background:#00e676; box-shadow:0 0 6px #00e676; }
  .sdot.r { background:#e8002a; box-shadow:0 0 6px #e8002a; }

  /* Timestamp field */
  .ts-row { display:flex; gap:8px; align-items:center; }
  .ts-row .neon-input { flex:1; }
  .ts-btn {
    padding:11px 13px; background:rgba(232,0,42,0.1);
    border:1.5px solid var(--border); border-radius:10px;
    color:var(--text-dim); cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; gap:6px;
    font-family:var(--title); font-size:10px; letter-spacing:1px;
  }
  .ts-btn:hover { background:rgba(232,0,42,0.2); border-color:var(--red); color:var(--text); }
  .ts-btn svg { width:15px; height:15px; }
  .ts-running { color:var(--green) !important; border-color:var(--green) !important; }

  /* DESCRIPTION */
  .desc-section { padding:0 24px 20px; }

  /* BOTTOM ACTIONS */
  .card-actions { display:grid; grid-template-columns:1fr 2fr; gap:12px; padding:16px 24px 24px; border-top:1px solid var(--border); }
  @media(max-width:480px) { .card-actions { grid-template-columns:1fr; } }
  .reset-btn {
    padding:14px; border:1.5px solid rgba(255,255,255,0.15);
    background:rgba(0,0,0,0.3); border-radius:12px;
    color:var(--text-dim); font-family:var(--title); font-size:11px; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .reset-btn:hover { border-color:rgba(255,255,255,0.3); color:var(--text); }
  .save-btn {
    padding:14px; border:1.5px solid var(--red);
    background:linear-gradient(135deg,rgba(180,0,30,0.8),rgba(100,0,15,0.9));
    border-radius:12px; color:#fff;
    font-family:var(--title); font-size:11px; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    position:relative; overflow:hidden;
  }
  .save-btn::before {
    content:''; position:absolute; inset:-100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
    transform:translateX(-100%); transition:transform 0.4s;
  }
  .save-btn:hover { background:linear-gradient(135deg,#e8002a,#8b0015); box-shadow:0 0 25px rgba(232,0,42,0.5); }
  .save-btn:hover::before { transform:translateX(300%); }
  .save-btn:disabled { opacity:0.5; cursor:not-allowed; }

  /* UID DISPLAY */
  .uid-bar { margin:0 24px 0; padding:8px 14px; background:rgba(0,0,0,0.3); border:1px solid rgba(232,0,42,0.15); border-radius:8px; display:flex; align-items:center; gap:10px; }
  .uid-label { font-family:var(--title); font-size:9px; letter-spacing:2px; color:var(--red); flex-shrink:0; }
  .uid-val { font-family:var(--mono); font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .uid-copy { padding:4px 10px; background:rgba(232,0,42,0.1); border:1px solid var(--border); border-radius:5px; font-family:var(--title); font-size:8px; letter-spacing:1.5px; cursor:pointer; color:var(--text-dim); transition:all 0.2s; }
  .uid-copy:hover { background:rgba(232,0,42,0.25); color:var(--text); }

  /* TOAST */
  #toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast {
    background:rgba(10,20,40,0.95); border-radius:12px; padding:14px 20px;
    border-left:3px solid var(--red);
    font-family:var(--body); font-size:14px; font-weight:600;
    backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.5);
    display:flex; align-items:center; gap:10px; min-width:240px;
    animation:toastIn 0.35s cubic-bezier(0.22,1,0.36,1);
    pointer-events:all;
  }
  @keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:none} }
  .toast.success { border-left-color:var(--green); }
  .toast.error   { border-left-color:var(--red); }
  .toast.info    { border-left-color:#4488ff; }
  .toast-icon { font-size:18px; }
  .toast-msg  { flex:1; }
  .toast.hide { animation:toastOut 0.3s forwards; }
  @keyframes toastOut { to{opacity:0;transform:translateX(30px)} }

  /* LOADING */
  #loading-screen { position:fixed; inset:0; z-index:100; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity 0.5s; }
  #loading-screen.hide { opacity:0; pointer-events:none; }
  .load-ring { width:60px; height:60px; border-radius:50%; border:3px solid rgba(232,0,42,0.15); border-top-color:var(--red); animation:spin 0.9s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-text { font-family:var(--title); font-size:11px; letter-spacing:4px; color:var(--red-dim); animation:blink 1.5s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* MISC */
  .divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:4px 0; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-ring"></div>
  <div class="load-text">AUTHENTICATING...</div>
</div>

<div id="toast-container"></div>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="mouse-glow" id="mouse-glow"></div>

<input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">

<div id="app">
  <div class="card" id="editor-card">
    <div class="card-corner-bl"></div>
    <div class="card-corner-br"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="header-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8002a" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span class="header-title">EDITOR <span>MODE</span></span>
      </div>
      <button class="close-btn" onclick="history.back()">✕</button>
    </div>

    <!-- UID bar -->
    <div class="uid-bar" style="margin-top:16px">
      <span class="uid-label">YOUR UID</span>
      <span class="uid-val" id="uid-display">—</span>
      <button class="uid-copy" onclick="copyUID()">COPY</button>
    </div>

    <!-- Body grid -->
    <div class="card-body">

      <!-- LEFT: Avatar -->
      <div class="avatar-col">
        <div class="avatar-ring-outer" id="avatar-ring" onclick="triggerUpload()">
          <div class="avatar-glow"></div>
          <svg class="avatar-ring-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="92" stroke="rgba(232,0,42,0.6)" stroke-width="2" fill="none" stroke-dasharray="12 8" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="85" stroke="rgba(232,0,42,0.2)" stroke-width="1" fill="none" stroke-dasharray="4 20" stroke-linecap="round"/>
          </svg>
          <svg class="avatar-ring-svg2" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" stroke="rgba(200,0,0,0.35)" stroke-width="1.5" fill="none" stroke-dasharray="3 15" stroke-linecap="round"/>
          </svg>
          <div class="avatar-img-wrap">
            <img id="avatar-preview" class="avatar-img" src="" style="display:none" alt="Avatar">
            <div class="avatar-fallback" id="avatar-fb">👾</div>
          </div>
          <div class="avatar-hover-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>UPLOAD</span>
          </div>
        </div>
        <button class="change-avatar-btn" onclick="triggerUpload()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          CHANGE AVATAR
        </button>
        <div class="upload-hint">Recommended size: 512x512px<br>Format: PNG / JPG</div>
      </div>

      <!-- RIGHT: Fields -->
      <div class="fields-col">

        <!-- Nickname -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            NICKNAME
          </label>
          <input class="neon-input" id="input-nickname" type="text" placeholder="Enter" maxlength="24" autocomplete="off">
        </div>

        <!-- Friendcode -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            FRIENDCODE
          </label>
          <div class="input-row">
            <input class="neon-input" id="input-friendcode" type="text" placeholder="Enter" maxlength="20" autocomplete="off">
            <button class="gen-btn" onclick="generateFriendcode()">GENERATE</button>
          </div>
        </div>

        <!-- Status -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            STATUS
          </label>
          <div class="status-btns" id="status-btns">
            <button class="status-btn active" data-status="Playing"   onclick="setStatus(this)"><div class="sdot g"></div> Playing</button>
            <button class="status-btn"         data-status="Idle"     onclick="setStatus(this)"><div class="sdot g"></div> Idle</button>
            <button class="status-btn"         data-status="Offline"  onclick="setStatus(this)"><div class="sdot r"></div> Offline</button>
            <button class="status-btn"         data-status="Busy"     onclick="setStatus(this)"><div class="sdot r"></div> Busy</button>
          </div>
          <div class="field-hint">Select your current status</div>
        </div>

        <!-- Lobby Code -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            LOBBY CODE
          </label>
          <input class="neon-input" id="input-lobbycode" type="text" placeholder="Enter" maxlength="10" autocomplete="off">
          <div class="field-hint">Share this code with others to join your lobby</div>
        </div>

        <!-- Playing Since -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            PLAYING SINCE
          </label>
          <div class="ts-row">
            <input class="neon-input" id="ts-display" type="text" placeholder="Start Live TimeStamp" readonly style="cursor:default;color:#7a8aaa">
            <button class="ts-btn" id="ts-btn" onclick="toggleTimestamp()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span id="ts-btn-label">START</span>
            </button>
          </div>
          <div class="field-hint">Automatically tracks how long you've been playing</div>
        </div>

      </div>
    </div>

    <!-- Description (full width) -->
    <div class="desc-section">
      <div class="field-group">
        <label class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          DESCRIPTION
        </label>
        <textarea class="neon-textarea" id="input-description" placeholder="Write something about yourself..." maxlength="200" oninput="updateCharCount()"></textarea>
        <div class="char-count" id="char-count">0 / 200</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="card-actions">
      <button class="reset-btn" onclick="resetForm()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        RESET
      </button>
      <button class="save-btn" id="save-btn" onclick="saveProfile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        SAVE CHANGES
      </button>
    </div>

  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getStorage, ref as storageRef, uploadString, getDownloadURL }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

  /* ===== CONFIG ===== */
  const firebaseConfig = {
    apiKey: "AIzaSyC0-aU-Tse8Xr3XGqXXGsIHyI4oR7iLwxU",
    authDomain: "mozstudiokey.firebaseapp.com",
    projectId: "mozstudiokey",
    storageBucket: "mozstudiokey.firebasestorage.app",
    messagingSenderId: "216274047995",
    appId: "1:216274047995:web:bd7c0749bbb46d46b2315e",
    measurementId: "G-T47VM18K4W"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const storage = getStorage(app);

  let currentUID = null;
  let pendingAvatarBase64 = null;
  let selectedStatus = 'Playing';
  let timestampStart = null;   // ms epoch — when timer started
  let tsRunning = false;
  let tsInterval = null;
  let saveLock = false;
  let originalData = {};

  /* ===== AUTH ===== */
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUID = user.uid;
      document.getElementById('uid-display').textContent = currentUID;
      await loadProfile();
      hideLoading();
    }
  });

  // Trigger anonymous sign-in
  signInAnonymously(auth).catch(err => {
    console.error('Auth error:', err);
    hideLoading();
    showToast('Auth failed: ' + err.message, 'error');
  });

  /* ===== LOAD PROFILE ===== */
  async function loadProfile() {
    try {
      const snap = await getDoc(doc(db, 'profiles', currentUID));
      if (snap.exists()) {
        const d = snap.data();
        originalData = d;
        document.getElementById('input-nickname').value    = d.nickname    || '';
        document.getElementById('input-friendcode').value  = d.friendcode  || '';
        document.getElementById('input-lobbycode').value   = d.lobbycode   || '';
        document.getElementById('input-description').value = d.description || '';
        updateCharCount();

        // Status
        if (d.status) setStatusByValue(d.status);

        // Avatar
        if (d.avatarurl) {
          const img = document.getElementById('avatar-preview');
          img.src = d.avatarurl;
          img.style.display = 'block';
          document.getElementById('avatar-fb').style.display = 'none';
        }

        // Timestamp
        if (d.playingsince) {
          let ms;
          if (d.playingsince && typeof d.playingsince.toDate === 'function') {
            ms = d.playingsince.toDate().getTime();
          } else if (typeof d.playingsince === 'number') {
            ms = d.playingsince;
          } else {
            ms = new Date(d.playingsince).getTime();
          }
          if (!isNaN(ms)) {
            timestampStart = ms;
            tsRunning = true;
            startTsDisplay();
            document.getElementById('ts-btn').classList.add('ts-running');
            document.getElementById('ts-btn-label').textContent = 'STOP';
          }
        }

        showToast('Profile loaded', 'info');
      } else {
        showToast('No existing profile — start fresh!', 'info');
      }
    } catch (e) {
      console.error(e);
      showToast('Error loading profile', 'error');
    }
  }

  /* ===== TIMESTAMP LOGIC ===== */
  window.toggleTimestamp = function() {
    if (tsRunning) {
      // STOP
      tsRunning = false;
      clearInterval(tsInterval);
      timestampStart = null;
      document.getElementById('ts-display').value = '';
      document.getElementById('ts-btn').classList.remove('ts-running');
      document.getElementById('ts-btn-label').textContent = 'START';
      showToast('Timer stopped', 'info');
    } else {
      // START
      timestampStart = Date.now();
      tsRunning = true;
      startTsDisplay();
      document.getElementById('ts-btn').classList.add('ts-running');
      document.getElementById('ts-btn-label').textContent = 'STOP';
      showToast('Timer started!', 'success');
    }
  };

  function startTsDisplay() {
    clearInterval(tsInterval);
    function update() {
      if (!timestampStart) return;
      const diff = Date.now() - timestampStart;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('ts-display').value =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    update();
    tsInterval = setInterval(update, 1000);
  }

  /* ===== STATUS ===== */
  window.setStatus = function(btn) {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStatus = btn.dataset.status;
  };
  function setStatusByValue(val) {
    document.querySelectorAll('.status-btn').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.status === val) b.classList.add('active');
    });
    selectedStatus = val;
  }

  /* ===== FRIENDCODE ===== */
  window.generateFriendcode = function() {
    const adj = ['swift','neon','dark','void','nova','cyber','ghost','hyper'];
    const noun = ['fox','star','wolf','hawk','byte','core','zone','flux'];
    const num  = Math.floor(Math.random() * 9000 + 1000);
    const code = adj[~~(Math.random()*adj.length)] + noun[~~(Math.random()*noun.length)] + '#' + num;
    document.getElementById('input-friendcode').value = code;
  };

  /* ===== AVATAR UPLOAD ===== */
  window.triggerUpload = function() {
    document.getElementById('file-input').click();
  };

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!['image/png','image/jpeg','image/webp','image/gif'].includes(file.type)) {
      showToast('Invalid file type', 'error'); return;
    }
    if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5MB)', 'error'); return; }
    const base64 = await fileToBase64(file);
    const compressed = await compressImage(base64, 512);
    pendingAvatarBase64 = compressed;
    const img = document.getElementById('avatar-preview');
    img.src = compressed;
    img.style.display = 'block';
    document.getElementById('avatar-fb').style.display = 'none';
    showToast('Avatar ready — save to apply', 'success');
    e.target.value = '';
  });

  // Drag and drop
  const card = document.getElementById('editor-card');
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', async (e) => {
    e.preventDefault(); card.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      document.getElementById('file-input').files; // simulate
      const base64 = await fileToBase64(file);
      const compressed = await compressImage(base64, 512);
      pendingAvatarBase64 = compressed;
      const img = document.getElementById('avatar-preview');
      img.src = compressed; img.style.display = 'block';
      document.getElementById('avatar-fb').style.display = 'none';
      showToast('Avatar dropped — save to apply', 'success');
    }
  });

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function compressImage(base64, maxSize) {
    return new Promise((res) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let {width: w, height: h} = img;
        if (w > maxSize || h > maxSize) {
          const ratio = Math.min(maxSize/w, maxSize/h);
          w = ~~(w * ratio); h = ~~(h * ratio);
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = base64;
    });
  }

  /* ===== SAVE ===== */
  window.saveProfile = async function() {
    if (saveLock) return;
    const nickname = document.getElementById('input-nickname').value.trim();
    if (!nickname) { showToast('Nickname cannot be empty', 'error'); return; }
    const friendcode = document.getElementById('input-friendcode').value.trim();
    const lobbycode  = document.getElementById('input-lobbycode').value.trim();
    const description = document.getElementById('input-description').value.trim().slice(0, 200);

    saveLock = true;
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="load-ring" style="width:18px;height:18px;border-width:2px"></div> SAVING...';

    showToast('Saving...', 'info');

    try {
      // Upload avatar to Storage if new
      let avatarurl = originalData.avatarurl || '';
      if (pendingAvatarBase64 && currentUID) {
        try {
          const sRef = storageRef(storage, `avatars/${currentUID}/avatar.jpg`);
          await uploadString(sRef, pendingAvatarBase64, 'data_url');
          avatarurl = await getDownloadURL(sRef);
          pendingAvatarBase64 = null;
        } catch (uploadErr) {
          // Fallback: store base64 directly in Firestore (for small images)
          console.warn('Storage upload failed, storing base64:', uploadErr);
          avatarurl = pendingAvatarBase64;
          pendingAvatarBase64 = null;
        }
      }

      const profileData = {
        nickname,
        friendcode,
        status: selectedStatus,
        lobbycode,
        playingsince: tsRunning && timestampStart ? timestampStart : null,
        description,
        avatarurl,
        lastupdated: serverTimestamp()
      };

      await setDoc(doc(db, 'profiles', currentUID), profileData, { merge: true });
      originalData = { ...profileData };

      showToast('Profile saved! ✓', 'success');
    } catch (e) {
      console.error(e);
      showToast('Save failed: ' + e.message, 'error');
    } finally {
      saveLock = false;
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> SAVE CHANGES';
    }
  };

  /* ===== RESET ===== */
  window.resetForm = function() {
    document.getElementById('input-nickname').value    = originalData.nickname    || '';
    document.getElementById('input-friendcode').value  = originalData.friendcode  || '';
    document.getElementById('input-lobbycode').value   = originalData.lobbycode   || '';
    document.getElementById('input-description').value = originalData.description || '';
    updateCharCount();
    if (originalData.status) setStatusByValue(originalData.status);
    pendingAvatarBase64 = null;
    // Reset avatar preview
    const img = document.getElementById('avatar-preview');
    if (originalData.avatarurl) { img.src = originalData.avatarurl; img.style.display='block'; document.getElementById('avatar-fb').style.display='none'; }
    else { img.style.display='none'; document.getElementById('avatar-fb').style.display='flex'; }
    showToast('Form reset', 'info');
  };

  /* ===== COPY UID ===== */
  window.copyUID = function() {
    if (currentUID) navigator.clipboard.writeText(currentUID).then(() => showToast('UID copied!', 'success'));
  };

  /* ===== CHAR COUNT ===== */
  window.updateCharCount = function() {
    const len = document.getElementById('input-description').value.length;
    const el = document.getElementById('char-count');
    el.textContent = `${len} / 200`;
    el.className = 'char-count' + (len > 180 ? ' warn' : '');
  };

  /* ===== TOAST ===== */
  function showToast(msg, type = 'info') {
    const icons = { success:'✅', error:'❌', info:'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-icon">${icons[type]||'💬'}</span><span class="toast-msg">${msg}</span>`;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => {
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 350);
    }, 3200);
  }
  window._showToast = showToast;

  /* ===== LOADING ===== */
  function hideLoading() {
    const s = document.getElementById('loading-screen');
    s.classList.add('hide');
    setTimeout(() => s.style.display='none', 500);
  }

  /* ===== OFFLINE ===== */
  window.addEventListener('offline', () => showToast('Connection lost', 'error'));
  window.addEventListener('online',  () => showToast('Back online', 'success'));
</script>

<!-- Canvas + Mouse -->
<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<140;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,a:Math.random(),tw:Math.random()*Math.PI*2,sp:Math.random()*0.0004+0.0001});
  for(let i=0;i<30;i++) particles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,r:Math.random()*2+0.5,a:Math.random()*0.4+0.1,c:Math.random()>0.6?'#e8002a':'#1a3060'});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
    g.addColorStop(0,'#061225');g.addColorStop(0.5,'#030d1a');g.addColorStop(1,'#020810');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.tw+=s.sp*60;const a=s.a*(0.5+0.5*Math.sin(s.tw));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${a})`;ctx.fill();});
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.a*255).toString(16).padStart(2,'0');ctx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
  const glow=document.getElementById('mouse-glow');
  document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
})();
</script>

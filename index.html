<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — MozStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e8002a;
    --red-glow: #ff0033;
    --red-dim: #8b0015;
    --navy: #040d1a;
    --navy2: #061225;
    --panel: rgba(10,20,40,0.88);
    --border: rgba(232,0,42,0.35);
    --border-bright: rgba(232,0,42,0.7);
    --text: #e8eaf6;
    --text-dim: #7a8aaa;
    --green: #00e676;
    --mono: 'Share Tech Mono', monospace;
    --title: 'Orbitron', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }
  html, body { min-height: 100vh; background: var(--navy); font-family: var(--body); color: var(--text); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy2); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }

  #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .scanlines { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); opacity: 0.4; }
  .mouse-glow { position: fixed; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle,rgba(232,0,42,0.07) 0%,transparent 70%); transform: translate(-50%,-50%); pointer-events: none; z-index: 2; }

  #app { position: relative; z-index: 10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

  .card {
    width: 100%; max-width: 800px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 0 60px rgba(232,0,42,0.12), 0 0 120px rgba(232,0,42,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:none} }
  .card::before,.card::after { content:''; position:absolute; width:18px; height:18px; border-color:var(--red); border-style:solid; z-index:5; }
  .card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .card::after  { top:10px; right:10px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .card-corner-bl,.card-corner-br { position:absolute; width:18px; height:18px; z-index:5; border-color:var(--red); border-style:solid; }
  .card-corner-bl { bottom:10px; left:10px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .card-corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

  /* HEADER */
  .card-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 14px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.2); }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-title { font-family:var(--title); font-size:13px; letter-spacing:3px; font-weight:700; }
  .header-title span { color:var(--red); }

  /* UID BAR */
  .uid-bar { margin:16px 24px 0; padding:10px 14px; background:rgba(0,0,0,0.3); border:1px solid rgba(232,0,42,0.15); border-radius:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .uid-label { font-family:var(--title); font-size:9px; letter-spacing:2px; color:var(--red); flex-shrink:0; }
  .uid-val { font-family:var(--mono); font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .uid-copy { padding:5px 12px; background:rgba(232,0,42,0.1); border:1px solid var(--border); border-radius:5px; font-family:var(--title); font-size:8px; letter-spacing:1.5px; cursor:pointer; color:var(--text-dim); transition:all 0.2s; flex-shrink:0; }
  .uid-copy:hover { background:rgba(232,0,42,0.25); color:var(--text); }

  /* PROFILE LINK BAR */
  .link-bar { margin:10px 24px 0; padding:10px 14px; background:rgba(0,180,80,0.06); border:1px solid rgba(0,230,118,0.2); border-radius:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .link-label { font-family:var(--title); font-size:9px; letter-spacing:2px; color:var(--green); flex-shrink:0; }
  .link-val { font-family:var(--mono); font-size:11px; color:rgba(0,230,118,0.7); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .link-copy { padding:5px 12px; background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); border-radius:5px; font-family:var(--title); font-size:8px; letter-spacing:1.5px; cursor:pointer; color:var(--green); transition:all 0.2s; flex-shrink:0; }
  .link-copy:hover { background:rgba(0,230,118,0.2); }
  .link-open { padding:5px 12px; background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); border-radius:5px; font-family:var(--title); font-size:8px; letter-spacing:1.5px; cursor:pointer; color:var(--green); transition:all 0.2s; text-decoration:none; flex-shrink:0; }
  .link-open:hover { background:rgba(0,230,118,0.2); }

  /* BODY */
  .card-body { display:grid; grid-template-columns:220px 1fr; gap:0; padding:24px; }
  @media(max-width:640px) { .card-body { grid-template-columns:1fr; padding:16px; } }

  /* AVATAR COL */
  .avatar-col { display:flex; flex-direction:column; align-items:center; gap:14px; padding-right:24px; }
  @media(max-width:640px) { .avatar-col { padding-right:0; padding-bottom:20px; } }
  .avatar-ring-outer { position:relative; width:180px; height:180px; flex-shrink:0; }
  .avatar-ring-svg { position:absolute; inset:0; width:100%; height:100%; animation:spinRing 8s linear infinite; }
  @keyframes spinRing { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .avatar-ring-svg2 { position:absolute; inset:0; width:100%; height:100%; animation:spinRing 12s linear infinite reverse; opacity:0.5; }
  .avatar-glow { position:absolute; inset:10px; border-radius:50%; box-shadow:0 0 30px rgba(232,0,42,0.5),0 0 60px rgba(232,0,42,0.2); animation:breatheGlow 3s ease-in-out infinite; }
  @keyframes breatheGlow { 0%,100%{box-shadow:0 0 30px rgba(232,0,42,0.5),0 0 60px rgba(232,0,42,0.2)} 50%{box-shadow:0 0 50px rgba(232,0,42,0.8),0 0 90px rgba(232,0,42,0.35)} }
  .avatar-img-wrap { position:absolute; inset:18px; border-radius:50%; overflow:hidden; background:radial-gradient(circle at 30% 30%,#1a0510,#08020e); border:2px solid rgba(232,0,42,0.4); }
  .avatar-img { width:100%; height:100%; object-fit:cover; }
  .avatar-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:48px; }
  .avatar-status-ring { position:absolute; inset:14px; border-radius:50%; border:2px solid transparent; transition:border-color 0.4s; pointer-events:none; }
  .avatar-status-ring.online { border-color:rgba(0,230,118,0.5); box-shadow:0 0 12px rgba(0,230,118,0.3); }

  /* AVATAR URL INPUT */
  .avatar-url-wrap { width:100%; }
  .avatar-url-label { font-family:var(--title); font-size:9px; letter-spacing:2px; color:var(--red); margin-bottom:6px; display:block; }
  .avatar-url-row { display:flex; gap:6px; }
  .avatar-url-input { flex:1; min-width:0; background:rgba(0,0,0,0.45); border:1.5px solid rgba(232,0,42,0.25); border-radius:8px; padding:9px 12px; color:var(--text); font-family:var(--mono); font-size:11px; transition:border-color 0.2s,box-shadow 0.2s; outline:none; }
  .avatar-url-input::placeholder { color:rgba(255,255,255,0.2); }
  .avatar-url-input:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(232,0,42,0.1); }
  .apply-btn { padding:9px 12px; background:rgba(232,0,42,0.15); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--title); font-size:9px; letter-spacing:1px; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .apply-btn:hover { background:rgba(232,0,42,0.3); border-color:var(--red); }
  .avatar-hint { font-size:10px; color:var(--text-dim); text-align:center; line-height:1.6; margin-top:4px; }

  /* FIELDS */
  .fields-col { display:flex; flex-direction:column; gap:14px; }
  .field-group { display:flex; flex-direction:column; gap:5px; }
  .field-label { font-family:var(--title); font-size:10px; letter-spacing:2.5px; color:var(--red); display:flex; align-items:center; gap:6px; }
  .field-label svg { width:13px; height:13px; }
  .field-hint { font-size:11px; color:var(--text-dim); margin-top:2px; }

  .neon-input, .neon-textarea {
    width:100%; background:rgba(0,0,0,0.45);
    border:1.5px solid rgba(232,0,42,0.25);
    border-radius:10px; padding:11px 14px;
    color:var(--text); font-family:var(--mono); font-size:14px;
    transition:border-color 0.2s,box-shadow 0.2s; outline:none;
  }
  .neon-input::placeholder,.neon-textarea::placeholder { color:rgba(255,255,255,0.2); }
  .neon-input:focus,.neon-textarea:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(232,0,42,0.12),0 0 20px rgba(232,0,42,0.1); }
  .neon-textarea { resize:vertical; min-height:80px; max-height:150px; }
  .char-count { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-align:right; margin-top:2px; }
  .char-count.warn { color:var(--red); }

  .input-row { display:flex; gap:8px; align-items:center; }
  .input-row .neon-input { flex:1; }
  .gen-btn { padding:11px 14px; background:rgba(232,0,42,0.15); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--title); font-size:10px; letter-spacing:1.5px; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .gen-btn:hover { background:rgba(232,0,42,0.3); border-color:var(--red); box-shadow:0 0 12px rgba(232,0,42,0.3); }

  /* STATUS */
  .status-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .status-btn { padding:9px 14px; border-radius:8px; border:1.5px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:var(--text-dim); font-family:var(--body); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:7px; }
  .status-btn:hover { border-color:rgba(232,0,42,0.4); color:var(--text); }
  .status-btn.active { border-color:var(--red); background:rgba(232,0,42,0.12); color:var(--text); box-shadow:0 0 12px rgba(232,0,42,0.2); }
  .sdot { width:9px; height:9px; border-radius:50%; }
  .sdot.g { background:#00e676; box-shadow:0 0 6px #00e676; }
  .sdot.y { background:#ffaa00; box-shadow:0 0 6px #ffaa00; }
  .sdot.r { background:#e8002a; box-shadow:0 0 6px #e8002a; }

  /* TIMESTAMP */
  .ts-row { display:flex; gap:8px; align-items:center; }
  .ts-row .neon-input { flex:1; }
  .ts-btn { padding:11px 13px; background:rgba(232,0,42,0.1); border:1.5px solid var(--border); border-radius:10px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; font-family:var(--title); font-size:10px; letter-spacing:1px; }
  .ts-btn:hover { background:rgba(232,0,42,0.2); border-color:var(--red); color:var(--text); }
  .ts-btn.ts-running { color:var(--green) !important; border-color:var(--green) !important; background:rgba(0,230,118,0.08) !important; }
  .ts-btn svg { width:15px; height:15px; }

  /* DESC */
  .desc-section { padding:0 24px 20px; }

  /* ACTIONS */
  .card-actions { display:grid; grid-template-columns:1fr 2fr; gap:12px; padding:16px 24px 24px; border-top:1px solid var(--border); }
  @media(max-width:480px) { .card-actions { grid-template-columns:1fr; } }
  .reset-btn { padding:14px; border:1.5px solid rgba(255,255,255,0.15); background:rgba(0,0,0,0.3); border-radius:12px; color:var(--text-dim); font-family:var(--title); font-size:11px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .reset-btn:hover { border-color:rgba(255,255,255,0.3); color:var(--text); }
  .save-btn { padding:14px; border:1.5px solid var(--red); background:linear-gradient(135deg,rgba(180,0,30,0.8),rgba(100,0,15,0.9)); border-radius:12px; color:#fff; font-family:var(--title); font-size:11px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; position:relative; overflow:hidden; }
  .save-btn::before { content:''; position:absolute; inset:-100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); transform:translateX(-100%); transition:transform 0.4s; }
  .save-btn:hover { background:linear-gradient(135deg,#e8002a,#8b0015); box-shadow:0 0 25px rgba(232,0,42,0.5); }
  .save-btn:hover::before { transform:translateX(300%); }
  .save-btn:disabled { opacity:0.5; cursor:not-allowed; }

  /* TOAST */
  #toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast { background:rgba(10,20,40,0.95); border-radius:12px; padding:13px 18px; border-left:3px solid var(--red); font-family:var(--body); font-size:14px; font-weight:600; backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.5); display:flex; align-items:center; gap:10px; min-width:220px; animation:toastIn 0.35s cubic-bezier(0.22,1,0.36,1); pointer-events:all; }
  @keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:none} }
  .toast.success { border-left-color:var(--green); }
  .toast.error   { border-left-color:var(--red); }
  .toast.info    { border-left-color:#4488ff; }
  .toast.hide { animation:toastOut 0.3s forwards; }
  @keyframes toastOut { to{opacity:0;transform:translateX(30px)} }

  /* LOADING */
  #loading-screen { position:fixed; inset:0; z-index:100; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity 0.5s; }
  #loading-screen.hide { opacity:0; pointer-events:none; }
  .load-ring { width:60px; height:60px; border-radius:50%; border:3px solid rgba(232,0,42,0.15); border-top-color:var(--red); animation:spin 0.9s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-text { font-family:var(--title); font-size:11px; letter-spacing:4px; color:var(--red-dim); animation:blink 1.5s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-ring"></div>
  <div class="load-text">AUTHENTICATING...</div>
</div>

<div id="toast-container"></div>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="mouse-glow" id="mouse-glow"></div>

<div id="app">
  <div class="card" id="editor-card">
    <div class="card-corner-bl"></div>
    <div class="card-corner-br"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="header-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8002a" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span class="header-title">EDITOR <span>MODE</span></span>
      </div>
      <a href="profile.html" style="font-family:var(--title);font-size:9px;letter-spacing:2px;color:var(--text-dim);text-decoration:none;padding:7px 14px;border:1px solid rgba(232,0,42,0.2);border-radius:6px;transition:all 0.2s" onmouseover="this.style.color='#e8002a';this.style.borderColor='rgba(232,0,42,0.6)'" onmouseout="this.style.color='#7a8aaa';this.style.borderColor='rgba(232,0,42,0.2)'">VIEW PROFILE →</a>
    </div>

    <!-- UID bar -->
    <div class="uid-bar">
      <span class="uid-label">YOUR UID</span>
      <span class="uid-val" id="uid-display">waiting...</span>
      <button class="uid-copy" onclick="copyUID()">COPY</button>
    </div>

    <!-- Profile link bar -->
    <div class="link-bar">
      <span class="link-label">PROFILE LINK</span>
      <span class="link-val" id="link-display">—</span>
      <button class="link-copy" onclick="copyLink()">COPY LINK</button>
      <a class="link-open" id="link-open" href="#" target="_blank">OPEN ↗</a>
    </div>

    <!-- Body grid -->
    <div class="card-body">

      <!-- LEFT: Avatar -->
      <div class="avatar-col">
        <div class="avatar-ring-outer">
          <div class="avatar-glow"></div>
          <div class="avatar-status-ring" id="avatar-status-ring"></div>
          <svg class="avatar-ring-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="92" stroke="rgba(232,0,42,0.6)" stroke-width="2" fill="none" stroke-dasharray="12 8" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="85" stroke="rgba(232,0,42,0.2)" stroke-width="1" fill="none" stroke-dasharray="4 20" stroke-linecap="round"/>
          </svg>
          <svg class="avatar-ring-svg2" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" stroke="rgba(200,0,0,0.35)" stroke-width="1.5" fill="none" stroke-dasharray="3 15" stroke-linecap="round"/>
          </svg>
          <div class="avatar-img-wrap">
            <img id="avatar-preview" class="avatar-img" src="" style="display:none" alt="Avatar" onerror="this.style.display='none';document.getElementById('avatar-fb').style.display='flex'">
            <div class="avatar-fallback" id="avatar-fb">👾</div>
          </div>
        </div>

        <!-- Avatar URL input -->
        <div class="avatar-url-wrap">
          <span class="avatar-url-label">AVATAR IMAGE URL</span>
          <div class="avatar-url-row">
            <input class="avatar-url-input" id="input-avatarurl" type="url" placeholder="https://i.imgur.com/...">
            <button class="apply-btn" onclick="previewAvatar()">PREVIEW</button>
          </div>
          <div class="avatar-hint">Paste any direct image URL<br>imgur · discord cdn · etc.</div>
        </div>
      </div>

      <!-- RIGHT: Fields -->
      <div class="fields-col">

        <!-- Nickname -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            NICKNAME
          </label>
          <input class="neon-input" id="input-nickname" type="text" placeholder="Enter nickname..." maxlength="24" autocomplete="off">
        </div>

        <!-- Friendcode -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            FRIENDCODE
          </label>
          <div class="input-row">
            <input class="neon-input" id="input-friendcode" type="text" placeholder="e.g. swiftfox#1234" maxlength="20" autocomplete="off">
            <button class="gen-btn" onclick="generateFriendcode()">GENERATE</button>
          </div>
        </div>

        <!-- Status -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            STATUS
          </label>
          <div class="status-btns" id="status-btns">
            <button class="status-btn active" data-status="Playing"  onclick="setStatus(this)"><div class="sdot g"></div> Playing</button>
            <button class="status-btn"        data-status="Idle"     onclick="setStatus(this)"><div class="sdot y"></div> Idle</button>
            <button class="status-btn"        data-status="Offline"  onclick="setStatus(this)"><div class="sdot r"></div> Offline</button>
            <button class="status-btn"        data-status="Busy"     onclick="setStatus(this)"><div class="sdot r"></div> Busy</button>
          </div>
        </div>

        <!-- Lobby Code -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            LOBBY CODE
          </label>
          <input class="neon-input" id="input-lobbycode" type="text" placeholder="e.g. XKCD42" maxlength="10" autocomplete="off">
        </div>

        <!-- Playing Since -->
        <div class="field-group">
          <label class="field-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            PLAYING SINCE
          </label>
          <div class="ts-row">
            <input class="neon-input" id="ts-display" type="text" placeholder="Press START to begin timer" readonly style="cursor:default;color:#7a8aaa;font-size:13px">
            <button class="ts-btn" id="ts-btn" onclick="toggleTimestamp()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span id="ts-btn-label">START</span>
            </button>
          </div>
          <div class="field-hint">Live timer shown on profile page</div>
        </div>

      </div>
    </div>

    <!-- Description -->
    <div class="desc-section">
      <div class="field-group">
        <label class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          DESCRIPTION
        </label>
        <textarea class="neon-textarea" id="input-description" placeholder="Write something about yourself..." maxlength="200" oninput="updateCharCount()"></textarea>
        <div class="char-count" id="char-count">0 / 200</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="card-actions">
      <button class="reset-btn" onclick="resetForm()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        RESET
      </button>
      <button class="save-btn" id="save-btn" onclick="saveProfile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        SAVE CHANGES
      </button>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC0-aU-Tse8Xr3XGqXXGsIHyI4oR7iLwxU",
    authDomain: "mozstudiokey.firebaseapp.com",
    projectId: "mozstudiokey",
    storageBucket: "mozstudiokey.firebasestorage.app",
    messagingSenderId: "216274047995",
    appId: "1:216274047995:web:bd7c0749bbb46d46b2315e"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUID    = null;
  let selectedStatus = 'Playing';
  let timestampStart = null;
  let tsRunning      = false;
  let tsInterval     = null;
  let saveLock       = false;
  let originalData   = {};

  /* ── AUTH ── */
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUID = user.uid;
      document.getElementById('uid-display').textContent = currentUID;
      // Set profile link
      const profileURL = `${location.origin}${location.pathname.replace('editor.html','profile.html')}?uid=${currentUID}`;
      document.getElementById('link-display').textContent = profileURL;
      document.getElementById('link-open').href = profileURL;
      await loadProfile();
      hideLoading();
    }
  });

  signInAnonymously(auth).catch(err => {
    console.error(err);
    hideLoading();
    showToast('Auth failed: ' + err.message, 'error');
  });

  /* ── LOAD ── */
  async function loadProfile() {
    try {
      const snap = await getDoc(doc(db, 'profiles', currentUID));
      if (snap.exists()) {
        const d = snap.data();
        originalData = d;
        document.getElementById('input-nickname').value    = d.nickname    || '';
        document.getElementById('input-friendcode').value  = d.friendcode  || '';
        document.getElementById('input-lobbycode').value   = d.lobbycode   || '';
        document.getElementById('input-description').value = d.description || '';
        document.getElementById('input-avatarurl').value   = d.avatarurl   || '';
        updateCharCount();

        // Status
        if (d.status) setStatusByValue(d.status);

        // Avatar preview
        if (d.avatarurl) applyAvatarURL(d.avatarurl);

        // Timestamp
        if (d.playingsince) {
          let ms;
          if (d.playingsince && typeof d.playingsince.toDate === 'function') ms = d.playingsince.toDate().getTime();
          else if (typeof d.playingsince === 'number') ms = d.playingsince;
          else ms = new Date(d.playingsince).getTime();
          if (!isNaN(ms)) {
            timestampStart = ms;
            tsRunning = true;
            startTsDisplay();
            document.getElementById('ts-btn').classList.add('ts-running');
            document.getElementById('ts-btn-label').textContent = 'STOP';
          }
        }

        showToast('Profile loaded ✓', 'success');
      } else {
        showToast('New profile — fill in your details!', 'info');
      }
    } catch(e) {
      console.error(e);
      showToast('Error loading: ' + e.message, 'error');
    }
  }

  /* ── AVATAR URL PREVIEW ── */
  window.previewAvatar = function() {
    const url = document.getElementById('input-avatarurl').value.trim();
    if (!url) { showToast('Paste a URL first', 'error'); return; }
    applyAvatarURL(url);
    showToast('Avatar previewed!', 'success');
  };

  function applyAvatarURL(url) {
    const img = document.getElementById('avatar-preview');
    const fb  = document.getElementById('avatar-fb');
    img.onload  = () => { img.style.display='block'; fb.style.display='none'; };
    img.onerror = () => { img.style.display='none'; fb.style.display='flex'; showToast('Could not load image — check the URL', 'error'); };
    img.src = url;
  }

  // Also auto-preview when user leaves the URL field
  document.getElementById('input-avatarurl').addEventListener('blur', () => {
    const url = document.getElementById('input-avatarurl').value.trim();
    if (url) applyAvatarURL(url);
  });

  /* ── TIMESTAMP ── */
  window.toggleTimestamp = function() {
    if (tsRunning) {
      tsRunning = false;
      clearInterval(tsInterval);
      timestampStart = null;
      document.getElementById('ts-display').value = '';
      document.getElementById('ts-btn').classList.remove('ts-running');
      document.getElementById('ts-btn-label').textContent = 'START';
      showToast('Timer stopped', 'info');
    } else {
      timestampStart = Date.now();
      tsRunning = true;
      startTsDisplay();
      document.getElementById('ts-btn').classList.add('ts-running');
      document.getElementById('ts-btn-label').textContent = 'STOP';
      showToast('Timer started!', 'success');
    }
  };

  function startTsDisplay() {
    clearInterval(tsInterval);
    function tick() {
      if (!timestampStart) return;
      const diff = Date.now() - timestampStart;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('ts-display').value =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    tick();
    tsInterval = setInterval(tick, 1000);
  }

  /* ── STATUS ── */
  window.setStatus = function(btn) {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStatus = btn.dataset.status;
    // Update avatar ring
    const ring = document.getElementById('avatar-status-ring');
    ring.className = 'avatar-status-ring' + (selectedStatus === 'Playing' || selectedStatus === 'Idle' ? ' online' : '');
  };

  function setStatusByValue(val) {
    document.querySelectorAll('.status-btn').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.status === val) b.classList.add('active');
    });
    selectedStatus = val;
  }

  /* ── FRIENDCODE ── */
  window.generateFriendcode = function() {
    const adj  = ['swift','neon','dark','void','nova','cyber','ghost','hyper','zero','arc'];
    const noun = ['fox','star','wolf','hawk','byte','core','zone','flux','grid','pulse'];
    const num  = Math.floor(Math.random() * 9000 + 1000);
    document.getElementById('input-friendcode').value =
      adj[~~(Math.random()*adj.length)] + noun[~~(Math.random()*noun.length)] + '#' + num;
  };

  /* ── SAVE ── */
  window.saveProfile = async function() {
    if (saveLock || !currentUID) return;
    const nickname = document.getElementById('input-nickname').value.trim();
    if (!nickname) { showToast('Nickname cannot be empty!', 'error'); return; }

    saveLock = true;
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.innerHTML = '<div style="width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;animation:spin 0.8s linear infinite"></div> SAVING...';

    try {
      const avatarurl = document.getElementById('input-avatarurl').value.trim();

      const profileData = {
        nickname,
        friendcode:   document.getElementById('input-friendcode').value.trim(),
        status:       selectedStatus,
        lobbycode:    document.getElementById('input-lobbycode').value.trim(),
        description:  document.getElementById('input-description').value.trim().slice(0, 200),
        avatarurl,
        playingsince: tsRunning && timestampStart ? timestampStart : null,
        lastupdated:  serverTimestamp()
      };

      await setDoc(doc(db, 'profiles', currentUID), profileData, { merge: true });
      originalData = { ...profileData };
      showToast('Profile saved! ✓', 'success');
    } catch(e) {
      console.error(e);
      showToast('Save failed: ' + e.message, 'error');
    } finally {
      saveLock = false;
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> SAVE CHANGES';
    }
  };

  /* ── RESET ── */
  window.resetForm = function() {
    document.getElementById('input-nickname').value    = originalData.nickname    || '';
    document.getElementById('input-friendcode').value  = originalData.friendcode  || '';
    document.getElementById('input-lobbycode').value   = originalData.lobbycode   || '';
    document.getElementById('input-description').value = originalData.description || '';
    document.getElementById('input-avatarurl').value   = originalData.avatarurl   || '';
    updateCharCount();
    if (originalData.status) setStatusByValue(originalData.status);
    if (originalData.avatarurl) applyAvatarURL(originalData.avatarurl);
    else { document.getElementById('avatar-preview').style.display='none'; document.getElementById('avatar-fb').style.display='flex'; }
    showToast('Form reset', 'info');
  };

  /* ── COPY UTILS ── */
  window.copyUID = function() {
    if (currentUID) navigator.clipboard.writeText(currentUID).then(() => showToast('UID copied!', 'success'));
  };
  window.copyLink = function() {
    const link = document.getElementById('link-display').textContent;
    if (link !== '—') navigator.clipboard.writeText(link).then(() => showToast('Profile link copied!', 'success'));
  };

  /* ── CHAR COUNT ── */
  window.updateCharCount = function() {
    const len = document.getElementById('input-description').value.length;
    const el  = document.getElementById('char-count');
    el.textContent = `${len} / 200`;
    el.className = 'char-count' + (len > 180 ? ' warn' : '');
  };

  /* ── TOAST ── */
  function showToast(msg, type = 'info') {
    const icons = { success:'✅', error:'❌', info:'ℹ️' };
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${icons[type]||'💬'}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 350); }, 3000);
  }

  /* ── LOADING ── */
  function hideLoading() {
    const s = document.getElementById('loading-screen');
    s.classList.add('hide');
    setTimeout(() => s.style.display='none', 500);
  }

  window.addEventListener('offline', () => showToast('Connection lost', 'error'));
  window.addEventListener('online',  () => showToast('Back online ✓', 'success'));
</script>

<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], particles=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<140;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,a:Math.random(),tw:Math.random()*Math.PI*2,sp:Math.random()*0.0004+0.0001});
  for(let i=0;i<30;i++) particles.push({x:Math.random()*9999,y:Math.random()*9999,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,r:Math.random()*2+0.5,a:Math.random()*0.4+0.1,c:Math.random()>0.6?'#e8002a':'#1a3060'});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
    g.addColorStop(0,'#061225');g.addColorStop(0.5,'#030d1a');g.addColorStop(1,'#020810');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.tw+=s.sp*60;const a=s.a*(0.5+0.5*Math.sin(s.tw));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${a})`;ctx.fill();});
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.a*255).toString(16).padStart(2,'0');ctx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
  const glow=document.getElementById('mouse-glow');
  document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
})();
</script>
